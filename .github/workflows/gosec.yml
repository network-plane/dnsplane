# Static security scan with gosec (https://github.com/securego/gosec).
# Local: ./scripts/gosec.sh   (installs pinned gosec via go install if missing)
name: Gosec

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: Install and run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          extra=()
          if [[ -f .gosec.json ]]; then extra+=(-conf .gosec.json); fi
          "$(go env GOPATH)/bin/gosec" "${extra[@]}" -fmt text -sort ./...
