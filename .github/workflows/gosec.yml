# Static security scan with gosec (https://github.com/securego/gosec).
# Local: ./scripts/gosec.sh   (installs pinned gosec via go install if missing)
name: Gosec

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: Install and run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          extra=()
          if [[ -f .gosec.json ]]; then extra+=(-conf .gosec.json); fi
          "$(go env GOPATH)/bin/gosec" "${extra[@]}" -fmt text -sort ./...
