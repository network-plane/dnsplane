# Static security scan with gosec (https://github.com/securego/gosec).
# Local: ./scripts/gosec.sh   (installs pinned gosec via go install if missing)
name: Gosec

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: Install and run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
          extra=()
          if [[ -f .gosec.json ]]; then extra+=(-conf .gosec.json); fi
          "$(go env GOPATH)/bin/gosec" "${extra[@]}" -fmt text -sort ./...
